name: earlyreleasetest

mongo:
  prefix: vro_infant
  reset: false

channel:
- name:  earlyrelease
  access: []
  policy: []


task:

- title: ingest
  template:
    pre:
      - ingest_lsst_alerts
    live:
      - resolve_run_time_aliases
      - hash_t2_config

  unit: AlertConsumer
  extra:
    iter_max: 500000
  supplier:
    unit: LSSTAlertSupplier
    config:
      deserialize: null
      loader:
        unit: ParquetAlertLoader
        config:
          path: /Users/jnordin/data/lsst/lsst-alerts-2026-02-24-r0.95.parquet

  directives:
  - channel: earlyrelease

    filter:
      unit: DecentVroFilter
      on_stock_match: bypass
      config:
        min_reliability: 0.99
        min_ndet: 1
        max_ndet: 3
        min_tspan: 0.
        max_tspan: 2
        min_abs_gal_lat: 7
        gaia_excessnoise_sig_max: 999
        gaia_plx_signif: 3
        gaia_pm_signif: 3
        gaia_rs: 20
        gaia_veto_gmag_max: 20
        gaia_veto_gmag_min: 9

    t2_compute:
    - &T2CatalogMatch
      unit: T2CatalogMatch
      ingest:
        filter: LSSTObjFilter
        select: last
        sort: diaObjectId
      config:  &catconfig_nearby
        catalogs:
          DESIDR1:
            keys_to_append:
            - z
            - spectype
            - subtype
            - ra
            - dec
            - desi_target
            - mag_g
            - mag_r
            - mag_z
            post_filter: null
            pre_filter: null
            rs_arcsec: 10.0
            use: extcats
          DESIDR1_stars:
            keys_to_append:
            - z
            - spectype
            - subtype
            - ra
            - dec
            - desi_target
            - mag_g
            - mag_r
            - mag_z
            post_filter: null
            pre_filter: null
            rs_arcsec: 3.0
            use: extcats
          GLADEv23:
            keys_to_append:
            - z
            - dist
            - dist_err
            - flag1
            - flag2
            - flag3
            rs_arcsec: 10
            use: extcats
          NEDLVS:
            keys_to_append:
            - objname
            - objtype
            - z
            - z_unc
            - z_tech
            - z_qual
            - z_qual_flag
            - ebv
            post_filter: null
            pre_filter: null
            rs_arcsec: 10.0
            use: extcats
          NEDz_extcats:
            keys_to_append:
            - ObjType
            - Velocity
            - z
            post_filter:
              z:
                $gte: 0.011
                $lte: 0.03
            pre_filter: null
            rs_arcsec: 60.0
            use: extcats
          SDSS_spec:
            all: false
            keys_to_append:
            - z
            - bptclass
            - subclass
            rs_arcsec: 10.0
            use: extcats
    - &T2TabulatorRiseDecline
      unit: T2TabulatorRiseDecline
      config:
        tabulator: &tabulator
        - unit: LSSTT2Tabulator
          config:
            zp: 31.4
    - &T2DigestRedshifts
      unit: T2DigestRedshifts
      config:
        max_redshift_category: 3
        t2_dependency:
        - unit: T2CatalogMatch
          config: *catconfig_nearby
          link_override: &latest
            filter: LSSTObjFilter
            select: last
            sort: nDiaSources
        - unit: T2LSPhotoZTap
          config:
            datalab_user:
              label: datalab/user
            datalab_pwd:
              label: datalab/password
          link_override: *latest
    - unit: T2InfantReport
      config: 
        tabulator: *tabulator
        t2_dependency:
        - *T2DigestRedshifts
        - *T2TabulatorRiseDecline
#        result_adapter:
#          unit: HopskotchAdapter
#          config:
#            broker: kafka.scimma.org
#            auth:
#              username:
#                label: scimma/jno/user
#              password:
#                label: scimma/jno/password
#            topic: ampel.lsst.extragalactic-infants
#            model: ampel.contrib.hu.model.LSSTReport.LSSTReport        


- title: Run T2s
  unit: T2Worker
  multiplier: 1
  config:
    send_beacon: false
    raise_exc: true
    unit_ids:
    - T2GetDiaObject
    - T2CatalogMatch
    - T2TabulatorRiseDecline
    - T2LSPhotoZTap

- title: Run T2s
  unit: T2Worker
  multiplier: 1
  config:
    send_beacon: false
    raise_exc: true
    unit_ids:
    - T2DigestRedshifts

- title: Run T2s
  unit: T2Worker
  multiplier: 1
  config:
    send_beacon: false
    raise_exc: true
    unit_ids:
    - T2InfantReport