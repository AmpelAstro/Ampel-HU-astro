name: earlyreleasetest

mongo:
  prefix: nucelar_stream
  reset: true

channel:
- name: earlyrelease_ext
  access: []
  policy: []


task:

- title: ingest
  template:
    live:
      - resolve_run_time_aliases
      - hash_t2_config

  unit: AlertConsumer
  config:
    iter_max: 50000
    compiler_opts: LSSTCompilerOptions
    supplier:
      unit: LSSTAlertSupplier
      config:
        deserialize: null
        loader:
          unit: ParquetAlertLoader
          config:
            path: /Users/jannisnecker/Downloads/lsst-alerts-2026-03-02--2026-03-10-r0.95.parquet
            condition:
              diaObject.nDiaSources >= 10
              and diaObject.nDiaSources < 200
              and diaSource.snr >= 5
              and diaSource.reliability >= 0.95

    shaper: {unit: LSSTDataPointShaper}
    directives:
    - channel: earlyrelease_ext

      filter:
        unit: DecentVroFilter
        on_stock_match: bypass
        config:
          min_reliability: 0.95
          #min_ndet_snr: 10
          min_ndet: 3
          #max_ndet: 200
          #min_ndet_cadence: 0.3
          min_tspan: 0.5
          max_tspan: 70
          min_abs_gal_lat: 12
          gaia_rs: 1.5
          gaia_excessnoise_sig_max: 10 
          gaia_pm_signif: 5 
          gaia_plx_signif: 5 
          gaia_veto_gmag_max: 20
          gaia_veto_gmag_min: 9


      ingest:
          mux:
            unit: LSSTMongoMuxer
            insert:
              point_t2:
              - unit: T2GetDiaObject
                config:
                  params:
                  - diaObjectId
                  - simVersion
                ingest:
                  filter: LSSTObjFilter
                  select: last
                  sort: diaObjectId
              - config: &dl_config
                  datalab_user:
                    label: datalab/user
                  datalab_pwd: 
                    label: datalab/password
                ingest: 
                  filter: LSSTObjFilter
                  select: last
                  sort: diaObjectId
                unit: T2LSPhotoZTap
              - config: '%T2CatalogMatch_general'
                ingest:
                  filter: LSSTObjFilter
                  select: last
                  sort: diaObjectId
                unit: T2CatalogMatch
            combine:
            - unit: LSSTT1Combiner
              state_t2:
              - config: &risedec_config
                  tabulator:
                  - unit: LSSTT2Tabulator
                    config:
                      zp: 31.4
                unit: T2TabulatorRiseDecline

#              - unit: T2FlagsRiseDecline
#                config:
#                  t2_dependency:
#                  - unit: T2TabulatorRiseDecline
#                    config: *risedec_config
#                    link_override:
#                      filter: LSSTObjFilter
#                      select: last
#                      sort: diaObjectId

              - unit: T2DigestRedshifts
                config: &digest_config
                  max_redshift_category: 7
                  t2_dependency:
                  - config: '%T2CatalogMatch_general'
                    link_override:
                      filter: LSSTObjFilter
                      select: last
                      sort: diaObjectId
                    unit: T2CatalogMatch
                  - config: *dl_config
                    link_override:
                      filter: LSSTObjFilter
                      select: last
                      sort: diaObjectId
