- title: Run T2s
  unit: T2Worker
  multiplier: 1
  config:
    send_beacon: false
    raise_exc: true
    unit_ids:
    - T2GetDiaObject
    - T2CatalogMatch
    - T2LSPhotoZTap
    - T2DigestRedshifts


- title: PlotAllCandidates
  unit: T3Processor
  config:
    raise_exc: true
    supply:
      unit: T3DefaultBufferSupplier
      config:
        select:
          unit: T3StockSelector
          config:
            channel: earlyrelease_ext
        load:
          unit: T3SimpleDataLoader
          config:
            directives:
              - STOCK
              - T1
              - T2DOC
              - DATAPOINT
            channel: earlyrelease_ext
        #complement:
        #- unit: LSSTCutoutImages
        #  config:
        #    eligible: brightest
        #    insecure: true
    stage:
      unit: T3SimpleStager
      config:
        execute:
          - unit: PlotTransientLightcurves
            config:
              pdf_path: /Users/jannisnecker/Desktop/nuclear_candidates.pdf
              save_png: false
              include_cutouts: false
              internal_cutout_fetch: true
              lsst_archive_insecure: true
              cutout_eligible: brightest

              stacking: true
              stacking_window_hours: 2.0

              tabulator:
              - unit: LSSTT2Tabulator
                config:
                  zp: 31.4